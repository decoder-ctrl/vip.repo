<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Method</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#e6e9ebb4;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#1d277e;
}

.subtitle{
    text-align:center;
    color:#555;
    margin-bottom:20px;
}

#selectedPlan{
    background:#dbeafe;
    color:#1d4ed8;
    padding:12px;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
    margin-bottom:20px;
}

.payment-method{
    border:2px solid #162557;
    padding:15px;
    margin:15px 0;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.payment-method:hover{
    background:#dbe8f5;
}

.payment-method.selected{
    background:#cfe3ff;
    border-color:#2563eb;
}

label{
    display:flex;
    align-items:center;
    cursor:pointer;
    font-weight:bold;
}

input[type="radio"]{
    margin-right:10px;
    transform:scale(1.2);
}

.btn-group{
    text-align:center;
    margin-top:25px;
}

button,
.telegram-btn{
    display:inline-block;
    padding:12px 22px;
    margin:10px 5px;
    border-radius:6px;
    background:#163251;
    color:white;
    text-decoration:none;
    font-size:16px;
    cursor:pointer;
    border:none;
    transition:0.3s;
}

button:hover,
.telegram-btn:hover{
    background:#0d2238;
}

#result{
    text-align:center;
    margin-top:20px;
    font-weight:bold;
    color:#162557;
}

</style>
</head>

<body>

<div class="container">

<h1>Select Payment Method</h1>

<p class="subtitle">Complete your VIP registration</p>

<div id="selectedPlan">Loading plan...</div>

<div class="payment-method">
<label><input type="radio" name="payment" value="Credit / Debit Card"> Credit / Debit Card</label>
</div>

<div class="payment-method">
<label><input type="radio" name="payment" value="PayPal"> PayPal</label>
</div>

<div class="payment-method">
<label><input type="radio" name="payment" value="Bitcoin Wallet"> Bitcoin Wallet</label>
</div>

<div class="payment-method">
<label><input type="radio" name="payment" value="Cash App"> Cash App</label>
</div>

<div class="btn-group">

<button onclick="showPayment()">Confirm Payment Method</button>

<a id="telegramLink"
   href="#"
   target="_blank"
   class="telegram-btn"
   onclick="return goTelegram()">
   Contact Us on Telegram
</a>

</div>

<p id="result"></p>

</div>

<script>

// GET PLAN FROM URL
const params = new URLSearchParams(window.location.search);
const plan = params.get("plan");

let formattedPlan = "No plan selected";

if(plan === "RegularVIP") formattedPlan = "Regular VIP";
else if(plan === "PremiumCard") formattedPlan = "Premium Card";
else if(plan === "GoldCard") formattedPlan = "Gold Card";

document.getElementById("selectedPlan").innerHTML =
"Selected Plan: " + formattedPlan;


// PAYMENT SELECTION UI
const radios = document.querySelectorAll('input[name="payment"]');
const boxes = document.querySelectorAll('.payment-method');

radios.forEach(radio => {
radio.addEventListener("change", () => {

    boxes.forEach(b => b.classList.remove("selected"));
    radio.closest(".payment-method").classList.add("selected");

});
});

let selectedPayment = "";

// CONFIRM BUTTON
function showPayment(){

selectedPayment = "";

radios.forEach(radio => {
    if(radio.checked){
        selectedPayment = radio.value;
    }
});

if(selectedPayment === ""){

    document.getElementById("result").innerHTML =
    "⚠ Please select a payment method.";

    return;
}

document.getElementById("result").innerHTML =
"Selected Payment: " + selectedPayment;

}

// TELEGRAM CONTROL (BLOCK IF NOT SELECTED)
function goTelegram(){

if(selectedPayment === ""){

    document.getElementById("result").innerHTML =
    "⚠ Please select a payment method before continuing.";

    return false; // STOP

}

const message =
"Hello, I want to register for " +
formattedPlan +
" using " +
selectedPayment;

const url =
"https://t.me/viponlyprivatechat?text=" +
encodeURIComponent(message);

window.open(url, "_blank");

return false;

}

</script>

</body>
</html>
