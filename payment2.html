<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#e6e9eb;
    padding:20px;
}

.container{
    max-width:650px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.15);
}

.lang{
    text-align:center;
    margin-bottom:20px;
}

.lang button{
    padding:8px 12px;
    margin:5px;
    border:none;
    border-radius:5px;
    background:#163251;
    color:white;
    cursor:pointer;
}

h2{
    text-align:center;
    color:#1d277e;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#555;
    margin-bottom:20px;
}

.notice{
    background:#fff7d6;
    border:1px solid #facc15;
    color:#7c5c00;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
    text-align:center;
}

.notice h3{
    margin-bottom:10px;
}

#planBox{
    background:#dbeafe;
    color:#1d4ed8;
    padding:12px;
    border-radius:10px;
    text-align:center;
    margin-bottom:20px;
    font-weight:bold;
}

.payment{
    border:2px solid #162557;
    padding:15px;
    margin:12px 0;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.payment:hover{
    background:#dbe8f5;
}

.payment.selected{
    background:#cfe3ff;
    border-color:#2563eb;
}

label{
    display:flex;
    align-items:center;
    cursor:pointer;
    font-weight:bold;
}

input[type="radio"]{
    margin-right:10px;
    transform:scale(1.2);
}

.buttons{
    text-align:center;
    margin-top:25px;
}

button,
.telegram-btn{
    display:inline-block;
    padding:12px 20px;
    margin:8px;
    border:none;
    border-radius:6px;
    background:#163251;
    color:white;
    text-decoration:none;
    cursor:pointer;
    transition:0.3s;
}

button:hover,
.telegram-btn:hover{
    background:#0d2238;
}

#result{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
    color:#162557;
}

</style>
</head>

<body>

<div class="container">

<div class="lang">
<button onclick="setLang('en')">English</button>
<button onclick="setLang('fr')">Français</button>
<button onclick="setLang('it')">Italiano</button>
</div>

<h2 id="title">Select Payment Method</h2>

<p class="subtitle" id="subtitle">
Complete your VIP registration
</p>

<!-- IMPORTANT NOTICE -->

<div class="notice">

<h3 id="noticeTitle">
Important Information
</h3>

<p id="noticeText">
Payments and registration will be completed by some of our
official representatives on Telegram after you select your
preferred payment method.
</p>

</div>

<p id="planBox"></p>

<!-- PAYMENT OPTIONS -->

<div class="payment">
<label>
<input type="radio" name="pay" value="Credit / Debit Card">
Credit / Debit Card
</label>
</div>

<div class="payment">
<label>
<input type="radio" name="pay" value="PayPal">
PayPal
</label>
</div>

<div class="payment">
<label>
<input type="radio" name="pay" value="Bitcoin Wallet">
Bitcoin Wallet
</label>
</div>

<div class="payment">
<label>
<input type="radio" name="pay" value="Cash App">
Cash App
</label>
</div>

<!-- BUTTONS -->

<div class="buttons">

<button onclick="confirmPay()" id="confirmBtn">
Confirm Payment
</button>

<a href="#"
   class="telegram-btn"
   id="tg"
   onclick="return goTelegram()">
Contact Telegram
</a>

</div>

<p id="result"></p>

</div>

<script>

// PLAN FROM URL

const params = new URLSearchParams(window.location.search);

let plan = params.get("plan");

let formattedPlan = plan || "None";

document.getElementById("planBox").innerText =
"Selected Plan: " + formattedPlan;


// PAYMENT SELECTION UI

const payments = document.querySelectorAll(".payment");
const radios = document.querySelectorAll('input[name="pay"]');

radios.forEach(radio=>{

radio.addEventListener("change", ()=>{

payments.forEach(p=>p.classList.remove("selected"));

radio.closest(".payment").classList.add("selected");

});

});


// LANGUAGE DATA

const texts = {

en:{
title:"Select Payment Method",
subtitle:"Complete your VIP registration",
confirm:"Confirm Payment",
telegram:"Contact Telegram",
warning:"Please select a payment method.",
question:"Do you want to continue to Telegram?",
noticeTitle:"Important Information",
noticeText:"Payments and registration will be completed by some of our official representatives on Telegram after you select your preferred payment method."
},

fr:{
title:"Choisir le mode de paiement",
subtitle:"Complétez votre inscription VIP",
confirm:"Confirmer le paiement",
telegram:"Contacter Telegram",
warning:"Veuillez sélectionner un mode de paiement.",
question:"Voulez-vous continuer vers Telegram ?",
noticeTitle:"Information Importante",
noticeText:"Les paiements et l'inscription seront finalisés par certains de nos représentants officiels sur Telegram après la sélection du mode de paiement."
},

it:{
title:"Seleziona metodo di pagamento",
subtitle:"Completa la registrazione VIP",
confirm:"Conferma pagamento",
telegram:"Contatta Telegram",
warning:"Seleziona un metodo di pagamento.",
question:"Vuoi continuare su Telegram?",
noticeTitle:"Informazione Importante",
noticeText:"I pagamenti e la registrazione saranno completati da alcuni dei nostri rappresentanti ufficiali su Telegram dopo aver selezionato il metodo di pagamento."
}

};

let currentLang = "en";

function setLang(lang){

currentLang = lang;

document.getElementById("title").innerText =
texts[lang].title;

document.getElementById("subtitle").innerText =
texts[lang].subtitle;

document.getElementById("confirmBtn").innerText =
texts[lang].confirm;

document.getElementById("tg").innerText =
texts[lang].telegram;

document.getElementById("noticeTitle").innerText =
texts[lang].noticeTitle;

document.getElementById("noticeText").innerText =
texts[lang].noticeText;

}


// PAYMENT VALIDATION

let selectedPay = "";

function confirmPay(){

selectedPay = "";

radios.forEach(r=>{

if(r.checked){
selectedPay = r.value;
}

});

if(!selectedPay){

document.getElementById("result").innerText =
texts[currentLang].warning;

return;

}

document.getElementById("result").innerText =
"Selected Payment: " + selectedPay;

}


// TELEGRAM FUNCTION

function goTelegram(){

if(!selectedPay){

document.getElementById("result").innerText =
texts[currentLang].warning;

return false;

}

let proceed = confirm(

"Plan: " + formattedPlan + "\n" +
"Payment: " + selectedPay + "\n\n" +
texts[currentLang].question

);

if(!proceed){
return false;
}

let message =
"Hello, I want to register for " +
formattedPlan +
" using " +
selectedPay;

let url =
"https://t.me/viponlyprivatechat?text=" +
encodeURIComponent(message);

window.open(url,"_blank");

return false;

}

</script>

</body>
</html>
