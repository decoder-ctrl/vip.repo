<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Smart Web</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(to bottom right,#0f172a,#1e293b);
    color:white;
}

.hero{
    padding:70px 20px;
    text-align:center;
}

.hero h1{
    font-size:40px;
}

.container{
    width:90%;
    max-width:1100px;
    margin:auto;
}

.lang{
    text-align:center;
    margin-top:15px;
}

.lang button{
    margin:5px;
    padding:8px 12px;
    cursor:pointer;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:40px;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:25px;
    border-radius:15px;
    text-align:center;
}

.price{
    font-size:30px;
    margin:10px 0;
    color:#60a5fa;
}

.btn{
    display:inline-block;
    padding:10px 20px;
    margin-top:10px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

</style>
</head>

<body>

<div class="hero">
<h1 id="title">VIP CARDS & RESERVATION MANAGEMENT</h1>
<p id="subtitle">Exclusive VIP access for premium members</p>

<div class="lang">
<button onclick="setLang('en')">English</button>
<button onclick="setLang('fr')">Français</button>
<button onclick="setLang('it')">Italiano</button>
</div>
</div>

<div class="container">

<div class="cards">

<div class="card">
<h3>Regular VIP</h3>
<div class="price">$4,500</div>
<a id="btn1" href="payment2.html?plan=RegularVIP" class="btn">Select Plan</a>
</div>

<div class="card">
<h3>Premium</h3>
<div class="price">$8,500</div>
<a id="btn2" href="payment2.html?plan=PremiumCard" class="btn">Select Plan</a>
</div>

<div class="card">
<h3>Gold</h3>
<div class="price">$15,000</div>
<a id="btn3" href="payment2.html?plan=GoldCard" class="btn">Select Plan</a>
</div>

</div>

</div>

<script>

const t = {

en:{
title:"VIP CARDS & RESERVATION MANAGEMENT",
subtitle:"Exclusive VIP access for premium members",
btn:"Select Plan"
},

fr:{
title:"GESTION VIP ET RÉSERVATIONS",
subtitle:"Accès VIP exclusif pour membres premium",
btn:"Choisir"
},

it:{
title:"GESTIONE VIP E PRENOTAZIONI",
subtitle:"Accesso VIP esclusivo per membri premium",
btn:"Seleziona"
}

};

function setLang(lang){

document.getElementById("title").innerText = t[lang].title;
document.getElementById("subtitle").innerText = t[lang].subtitle;

document.getElementById("btn1").innerText = t[lang].btn;
document.getElementById("btn2").innerText = t[lang].btn;
document.getElementById("btn3").innerText = t[lang].btn;

}

</script>

</body>
</html>
